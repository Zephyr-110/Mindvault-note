server:
  port: 8082

spring:
  profiles:
    active: local
  application:
    name: mindvault
  datasource:
    url: jdbc:mysql://localhost:3306/mindvault?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password: ${REDIS_PASSWORD:}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  cache:
    type: redis

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    root: info
    org.example: debug

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method
    doc-expansion: list
    persist-authorization: true
  packages-to-scan: org.example
  paths-to-match: /**
#这里也是
aliyun:
  oss:
    endpoint: oss-cn-beijing.aliyuncs.com
    access-key-id: ${OSS_ACCESS_KEY}
    access-key-secret: ${OSS_ACCESS_SECRET}
    bucket-name: ${OSS_BUCKET:mindvault-files}
#这里冒号后不给默认值，防止给空字符串造成异常
jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000